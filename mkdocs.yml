site_name: cwm-build-tools
site_description: Shared build, release, and CI tooling for CWM Joomla extensions.
site_url: https://joomla-bible-study.github.io/cwm-build-tools/
repo_url: https://github.com/Joomla-Bible-Study/cwm-build-tools
repo_name: Joomla-Bible-Study/cwm-build-tools
edit_uri: edit/main/docs/
copyright: Christian Web Ministries

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.top
    - navigation.sections
    - content.code.copy
    - content.action.edit
    - search.suggest
    - toc.follow

nav:
  - Home: index.md
  - How to use: how-to-use.md
  - Command reference: commands.md
  - Configuration: configuration.md
  - Releasing: releasing.md
  - JavaScript & JoomlaDialog: javascript-and-joomladialog.md

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

plugins:
  - search

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/Joomla-Bible-Study/cwm-build-tools
